<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEDxNewy Salon — 2050: What If?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --indigo: #3B3B98;
            --indigo-deep: #2C2C78;
            --coral: #E8475F;
            --coral-glow: #FF5A72;
            --white: #FFFFFF;
            --white-muted: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--indigo);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle atmospheric gradient */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 40%, rgba(232, 71, 95, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 60% 80% at 70% 60%, rgba(59, 59, 180, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 20% 80%, rgba(44, 44, 120, 0.4) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 720px;
        }

        /* TEDxNewy Salon heading */
        .brand {
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.2s forwards;
        }

        .brand .ted {
            color: var(--coral);
        }

        .brand .x {
            color: var(--coral);
            font-size: 0.75em;
            vertical-align: super;
            margin-right: 0.02em;
        }

        /* Theme — the hero moment */
        .theme {
            margin-bottom: 3.5rem;
        }

        .year {
            font-family: 'DM Sans', sans-serif;
            font-size: clamp(5rem, 18vw, 10rem);
            font-weight: 700;
            line-height: 0.9;
            color: var(--coral);
            letter-spacing: -0.03em;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.4s forwards;
        }

        .whatif {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            color: var(--white);
            line-height: 1.1;
            margin-top: 0.1em;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.6s forwards;
        }

        /* Event details */
        .details {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.9s forwards;
        }

        .details .date {
            font-weight: 500;
            font-size: clamp(0.95rem, 2.5vw, 1.15rem);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--white);
        }

        .details .venue {
            font-weight: 700;
            font-size: clamp(1.4rem, 4vw, 2rem);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--white);
        }

        .details .location-time {
            font-weight: 300;
            font-size: clamp(0.9rem, 2vw, 1.05rem);
            color: var(--white-muted);
            letter-spacing: 0.04em;
        }

        /* Divider line */
        .divider {
            width: 48px;
            height: 2px;
            background: var(--coral);
            margin: 2rem auto;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.8s forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <span class="ted">TED</span><span class="x">x</span><span>Newy Salon</span>
        </div>

        <div class="theme">
            <div class="year">2050</div>
            <div class="whatif">What If?</div>
        </div>

        <div class="divider"></div>

        <div class="details">
            <span class="date">Thursday 30 April</span>
            <span class="venue">Q Building</span>
            <span class="location-time">Honeysuckle &middot; 6:00pm</span>
        </div>
    </div>
</body>
</html>
